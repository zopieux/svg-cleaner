<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG CAD Cleaner | Standalone</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-accent: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.5), transparent);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--surface-accent);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: var(--surface-accent);
            cursor: not-allowed;
            transform: none;
        }

        .tolerance-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .tolerance-group label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        input[type="number"] {
            background: var(--bg);
            border: 1px solid var(--surface-accent);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.375rem;
            width: 80px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            min-height: 400px;
        }

        .preview-card {
            background: var(--surface);
            border-radius: 1rem;
            border: 1px solid var(--surface-accent);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            padding: 1rem;
            background: var(--surface-accent);
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-image: 
                linear-gradient(45deg, #162030 25%, transparent 25%), 
                linear-gradient(-45deg, #162030 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #162030 75%), 
                linear-gradient(-45deg, transparent 75%, #162030 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            overflow: auto;
        }

        .preview-content svg {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        #status {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--surface-accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
        }

        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .stats {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>SVG CAD Cleaner</h1>
        <p class="subtitle">Intelligent path snapping and chaining for precise CAD exports</p>
    </header>

    <main>
        <div class="controls">
            <div class="file-input-wrapper">
                <button class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Upload SVG
                </button>
                <input type="file" id="fileInput" accept=".svg">
            </div>

            <div class="tolerance-group">
                <label for="snapTolerance">Snap Tolerance</label>
                <input type="number" id="snapTolerance" value="0.1" step="0.01" min="0">
            </div>

            <button id="downloadBtn" class="btn btn-primary hidden" style="background-color: var(--accent);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download Cleaned
            </button>
        </div>

        <div class="preview-grid">
            <div class="preview-card">
                <div class="preview-header">
                    Original
                    <span id="origStats" class="stats"></span>
                </div>
                <div id="origPreview" class="preview-content">
                    <span style="color: var(--text-muted);">No file uploaded</span>
                </div>
            </div>

            <div class="preview-card">
                <div class="preview-header">
                    Cleaned
                    <span id="cleanStats" class="stats"></span>
                </div>
                <div id="cleanPreview" class="preview-content">
                    <span style="color: var(--text-muted);">Awaiting processing</span>
                </div>
            </div>
        </div>
    </main>

    <div id="status">
        <div class="spinner" id="statusSpinner"></div>
        <span id="statusText">Initializing Pyodide...</span>
    </div>

    <footer>
        Powered by Pyodide, Shapely, and NetworkX. No data leaves your browser.
    </footer>

    <script src="pyodide/pyodide.js"></script>
    <script src="main.js"></script>
</body>
</html>
